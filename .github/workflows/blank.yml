name: Build APK - Brute Force Icon and Ads

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip mc-assets.zip
          if [ -d "mc-assets" ]; then mv mc-assets/* .; fi

      - name: Brute Force Logo Replacement
        run: |
          # 1. Delete all XML icons (they override PNGs)
          find . -name "ic_launcher*.xml" -delete
          
          # 2. Find every image in the 'res' folder and replace it with your logo
          # This forces your logo to appear even if the app uses a different name
          if [ -f "my_logo.png" ]; then
            find app/src/main/res -name "*.png" -exec cp my_logo.png {} \;
            find app/src/main/res -name "*.webp" -exec cp my_logo.png {} \;
          fi

      - name: Global Ad ID Replacement (Everywhere)
        run: |
          # YOUR REWARD AD ID
          REAL_ID="ca-app-pub-3303988035586005/9477951640"
          
          # This searches EVERY file in the project for anything looking like a Google Ad ID
          # and replaces it with your real one.
          find . -type f -exec sed -i -E "s|ca-app-pub-[0-9]{16}/[0-9]{10}|$REAL_ID|g" {} +

      - name: Create Keystore & Config
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          find . -type d -name "app" -exec cp debug.keystore {}/debug.keystore \;
          echo '{"project_info":{"project_number":"123","project_id":"ai-studio-project"},"client":[{"client_info":{"mobilesdk_app_id":"1","android_client_info":{"package_name":"com.aistudio.mcassets.bxgvqy"}},"api_key":[{"current_key":"key"}],"services":{"ads_service":{"status":2}}}]}' > google-services.json
          find . -type d -name "app" -exec cp google-services.json {}/google-services.json \;

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        env:
          JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"
        run: |
          find . -name "gradlew" -exec chmod +x {} +
          gradle assembleDebug --no-daemon -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-AI-App
          path: "**/build/outputs/apk/debug/*.apk"
