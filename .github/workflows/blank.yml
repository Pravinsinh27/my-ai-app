name: Build APK - Final Icon and Reward Ads

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip mc-assets.zip
          if [ -d "mc-assets" ]; then mv mc-assets/* .; fi

      - name: Replace App Logo (Global Force)
        run: |
          # Delete all existing icons (XML and PNG) to clear the way
          find app/src/main/res -name "ic_launcher*" -delete
          
          # Force your logo into every drawable and mipmap folder
          if [ -f "my_logo.png" ]; then
            mkdir -p app/src/main/res/drawable
            cp my_logo.png app/src/main/res/drawable/ic_launcher.png
            cp my_logo.png app/src/main/res/drawable/ic_launcher_round.png
            for dir in app/src/main/res/mipmap-*; do
              cp my_logo.png "$dir/ic_launcher.png"
              cp my_logo.png "$dir/ic_launcher_round.png"
            done
          fi

      - name: Replace Ad Unit ID (Global Pattern Match)
        run: |
          # YOUR REWARD AD ID
          REAL_ID="ca-app-pub-3303988035586005/9477951640"
          
          # This finds ANY string starting with 'ca-app-pub-' and ending with numbers/slashes
          # and replaces it with your real Reward ID.
          find . -type f \( -name "*.xml" -o -name "*.kt" -o -name "*.java" -o -name "*.html" -o -name "*.js" \) -exec sed -i -E "s|ca-app-pub-[0-9]{16}/[0-9]{10}|$REAL_ID|g" {} +

      - name: Create Keystore & Config
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          find . -type d -name "app" -exec cp debug.keystore {}/debug.keystore \;
          echo '{"project_info":{"project_number":"123","project_id":"ai-studio-project"},"client":[{"client_info":{"mobilesdk_app_id":"1","android_client_info":{"package_name":"com.aistudio.mcassets.bxgvqy"}},"api_key":[{"current_key":"key"}],"services":{"ads_service":{"status":2}}}]}' > google-services.json
          find . -type d -name "app" -exec cp google-services.json {}/google-services.json \;

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build Final APK
        env:
          JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"
        run: |
          find . -name "gradlew" -exec chmod +x {} +
          gradle assembleDebug --no-daemon -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-AI-App
          path: "**/build/outputs/apk/debug/*.apk"
