name: Build App - Keystore Force Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip mc-assets.zip
          # Move files out of subfolders if they exist
          if [ -d "mc-assets" ]; then mv mc-assets/* .; fi

      - name: Generate and Force-Place Keystore
        run: |
          # 1. Create the keystore in the main folder
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # 2. Find every folder named 'app' and copy the keystore into it
          # This ensures that no matter where Gradle looks, the file is there
          find . -type d -name "app" -exec cp debug.keystore {}/debug.keystore \;
          
          # 3. Do the same for the google-services.json
          echo '{"project_info":{"project_number":"123","project_id":"ai-studio-project"},"client":[{"client_info":{"mobilesdk_app_id":"1","android_client_info":{"package_name":"com.aistudio.mcassets.bxgvqy"}},"api_key":[{"current_key":"key"}],"services":{"ads_service":{"status":2}}}]}' > google-services.json
          find . -type d -name "app" -exec cp google-services.json {}/google-services.json \;

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        env:
          JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"
        run: |
          # Find gradlew and make it executable
          find . -name "gradlew" -exec chmod +x {} +
          
          # Force build, skipping the problematic signing validation if possible
          gradle assembleDebug --no-daemon -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/debug/*.apk"
