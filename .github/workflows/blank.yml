name: Build APK - Nuclear Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip mc-assets.zip
          if [ -d "mc-assets" ]; then mv mc-assets/* .; fi
          if [ ! -f "build.gradle.kts" ]; then mv */* . || true; fi

      - name: Nuclear Patch (Remove Google Services Completely)
        run: |
          # 1. Search every .kts file and delete any line containing 'google-services' or 'gms'
          find . -name "*.kts" -exec sed -i '/google-services/d' {} +
          find . -name "*.kts" -exec sed -i '/gms/d' {} +
          
          # 2. Delete the specific configuration block that caused the previous error
          find . -name "build.gradle.kts" -exec sed -i '/googleServices {/,/}/d' {} +
          
          # 3. Delete any physical google-services.json files that might be confusing the build
          find . -name "google-services.json" -delete

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        run: |
          find . -name "gradlew" -exec chmod +x {} +
          # Running with -x means "exclude". We are forcing it to skip the Google Services task.
          gradle assembleDebug --no-daemon -x processDebugGoogleServices

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/debug/*.apk"
