name: Unzip and Build APK (Fixed)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project files
        run: |
          unzip mc-assets.zip
          if [ -d "mc-assets" ]; then mv mc-assets/* .; fi

      - name: Patch Project (Remove Google Services Requirement)
        run: |
          # This removes the Google Services plugin that is causing the error
          sed -i '/com.google.gms.google-services/d' app/build.gradle.kts || true
          sed -i '/google-services/d' build.gradle.kts || true
          
          # Create a dummy google-services.json just in case the code still looks for it
          echo '{"project_info":{"project_number":"1","project_id":"id"},"client":[{"client_info":{"mobilesdk_app_id":"1:1:android:1","android_client_info":{"package_name":"'$(grep -r "namespace" app/build.gradle.kts | awk -F'"' '{print $2}')'"}},"api_key":[{"current_key":"key"}]}]}' > app/google-services.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Build with Gradle
        # Using --no-daemon and -P helps avoid the "AWT/NullPointer" error
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew assembleDebug --no-daemon -x test
          else
            gradle assembleDebug --no-daemon -x test
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: app/build/outputs/apk/debug/*.apk
