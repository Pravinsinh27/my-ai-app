name: Build App - Final Path Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Fix Folder Structure
        run: |
          # 1. Unzip the file
          unzip mc-assets.zip
          
          # 2. Aggressively find the 'app' folder and move it to the root
          # This ensures that /home/runner/work/my-ai-app/my-ai-app/app exists
          if [ -d "mc-assets/app" ]; then
            mv mc-assets/* .
          elif [ -d "app" ]; then
            echo "App folder already in root"
          else
            # If it is nested deep, find it and bring it up
            APP_PATH=$(find . -name "app" -type d -first-parent)
            mv $APP_PATH/* . || true
          fi

      - name: Create Keystore in multiple locations
        run: |
          # Create the folder if it doesn't exist
          mkdir -p app
          # Generate keystore in the root AND the app folder just to be 100% sure
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          cp debug.keystore app/debug.keystore

      - name: Inject Firebase Config
        run: |
          # Ensure the package name matches your specific project
          mkdir -p app
          echo '{"project_info":{"project_number":"123"},"client":[{"client_info":{"mobilesdk_app_id":"1","android_client_info":{"package_name":"com.aistudio.mcassets.bxgvqy"}},"api_key":[{"current_key":"key"}]}]}' > app/google-services.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK (Headless Mode)
        env:
          # This flag fixes the "AWT-EventQueue-0" error from your screenshot
          JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"
        run: |
          # Find gradlew and make it executable
          find . -name "gradlew" -exec chmod +x {} +
          # Build using the system gradle, skipping tests to save time
          gradle assembleDebug --no-daemon -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/debug/*.apk"
