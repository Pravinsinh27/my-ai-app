name: Build APK - Fix Logo and Real Ads

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip mc-assets.zip
          if [ -d "mc-assets" ]; then mv mc-assets/* .; fi

      - name: Replace App Logo (Forcing PNG)
        run: |
          # 1. Delete all XML icons that "hide" our PNG
          find app/src/main/res -name "ic_launcher*.xml" -delete
          find app/src/main/res -name "ic_launcher_foreground.xml" -delete
          find app/src/main/res -name "ic_launcher_background.xml" -delete
          
          # 2. Force our PNG into every mipmap folder
          if [ -f "my_logo.png" ]; then
            for dir in app/src/main/res/mipmap-*; do
              cp my_logo.png "$dir/ic_launcher.png"
              cp my_logo.png "$dir/ic_launcher_round.png"
            done
          fi

      - name: Replace All Test Ad IDs (Real Ads)
        run: |
          # REPLACE THIS WITH YOUR REAL AD UNIT ID
          REAL_AD_ID="ca-app-pub-3303988035586005/9477951640"
          
          # This replaces Banner, Interstitial, and Rewarded test IDs
          find . -type f \( -name "*.xml" -o -name "*.kt" -o -name "*.java" \) -exec sed -i "s|ca-app-pub-3940256099942544/6300978111|$REAL_AD_ID|g" {} +
          find . -type f \( -name "*.xml" -o -name "*.kt" -o -name "*.java" \) -exec sed -i "s|ca-app-pub-3940256099942544/1033173712|$REAL_AD_ID|g" {} +
          find . -type f \( -name "*.xml" -o -name "*.kt" -o -name "*.java" \) -exec sed -i "s|ca-app-pub-3940256099942544/5224354917|$REAL_AD_ID|g" {} +

      - name: Create Keystore & Config
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          find . -type d -name "app" -exec cp debug.keystore {}/debug.keystore \;
          echo '{"project_info":{"project_number":"123","project_id":"ai-studio-project"},"client":[{"client_info":{"mobilesdk_app_id":"1","android_client_info":{"package_name":"com.aistudio.mcassets.bxgvqy"}},"api_key":[{"current_key":"key"}],"services":{"ads_service":{"status":2}}}]}' > google-services.json
          find . -type d -name "app" -exec cp google-services.json {}/google-services.json \;

      - name: Build Final APK
        env:
          JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"
        run: |
          find . -name "gradlew" -exec chmod +x {} +
          gradle assembleDebug --no-daemon -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-AI-App
          path: "**/build/outputs/apk/debug/*.apk"
