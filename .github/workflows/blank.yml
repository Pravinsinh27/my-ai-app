name: Build APK - App ID and Ad Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip -o mc-assets.zip
          if [ -d "mc-assets" ]; then mv mc-assets/* .; fi

      - name: Global Ad ID Replacement
        run: |
          # 1. YOUR REWARD AD UNIT ID (The one with the /)
          REAL_UNIT_ID="ca-app-pub-3940256099942544/5224354917"
          
          # 2. YOUR APP ID (The one with the ~)
          REAL_APP_ID="ca-app-pub-3303988035586005~3862662889"
          
          # Replace the Ad Unit ID in all files
          find . -type f -exec sed -i -E "s|ca-app-pub-[0-9]{16}/[0-9]{10}|$REAL_UNIT_ID|g" {} +
          
          # Replace the App ID in the AndroidManifest.xml (This is the most important fix)
          find . -name "AndroidManifest.xml" -exec sed -i -E "s|ca-app-pub-[0-9]{16}~[0-9]{10}|$REAL_APP_ID|g" {} +

      - name: Fix App Icon
        run: |
          find . -name "ic_launcher*" -delete
          mkdir -p app/src/main/res/drawable
          cp my_logo.png app/src/main/res/drawable/ic_launcher.png
          cp my_logo.png app/src/main/res/drawable/ic_launcher_round.png
          find . -name "AndroidManifest.xml" -exec sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@drawable/ic_launcher"|g' {} +
          find . -name "AndroidManifest.xml" -exec sed -i 's|android:roundIcon="@mipmap/ic_launcher_round"|android:roundIcon="@drawable/ic_launcher_round"|g' {} +

      - name: Create Keystore & Config
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          find . -type d -name "app" -exec cp debug.keystore {}/debug.keystore \;
          echo '{"project_info":{"project_number":"123","project_id":"ai-studio-project"},"client":[{"client_info":{"mobilesdk_app_id":"1","android_client_info":{"package_name":"com.aistudio.mcassets.bxgvqy"}},"api_key":[{"current_key":"key"}],"services":{"ads_service":{"status":2}}}]}' > google-services.json
          find . -type d -name "app" -exec cp google-services.json {}/google-services.json \;

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        env:
          JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"
        run: |
          find . -name "gradlew" -exec chmod +x {} +
          gradle assembleDebug --no-daemon -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-AI-App
          path: "**/build/outputs/apk/debug/*.apk"
