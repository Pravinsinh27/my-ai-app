name: Build APK - Final Attempt

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip mc-assets.zip
          if [ -d "mc-assets" ]; then mv mc-assets/* .; fi

      - name: Strip Google Services (Fix Error)
        run: |
          # 1. Remove the plugin from the app-level build file
          sed -i '/google-services/d' app/build.gradle.kts || true
          sed -i '/gms/d' app/build.gradle.kts || true
          
          # 2. Remove the plugin from the project-level build file
          sed -i '/google-services/d' build.gradle.kts || true
          
          # 3. Create a valid dummy file with your EXACT package name
          mkdir -p app
          echo '{
            "project_info": {"project_number": "1", "project_id": "dummy"},
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1:android:1",
                  "android_client_info": {"package_name": "com.aistudio.mcassets.bxgvqy"}
                },
                "api_key": [{"current_key": "dummy"}]
              }
            ],
            "configuration_version": "1"
          }' > app/google-services.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        run: |
          chmod +x gradlew || true
          if [ -f "gradlew" ]; then
            ./gradlew assembleDebug --no-daemon
          else
            gradle assembleDebug --no-daemon
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: app/build/outputs/apk/debug/*.apk
