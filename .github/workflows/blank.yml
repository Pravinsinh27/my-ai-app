name: Build Firebase App with Signing

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip mc-assets.zip
          if [ -d "mc-assets" ]; then mv mc-assets/* .; fi
          if [ ! -f "build.gradle.kts" ]; then mv */* . || true; fi

      - name: Create Keystore and Config
        run: |
          # 1. Generate the missing debug.keystore file
          mkdir -p app
          keytool -genkey -v -keystore app/debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # 2. Inject the Firebase config again
          echo '{
            "project_info": {
              "project_number": "123456789",
              "project_id": "ai-studio-project"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789:android:12345",
                  "android_client_info": {
                    "package_name": "com.aistudio.mcassets.bxgvqy"
                  }
                },
                "api_key": [{ "current_key": "dummy_key" }],
                "services": { "appinvite_service": { "status": 1 } }
              }
            ],
            "configuration_version": "1"
          }' > app/google-services.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        run: |
          find . -name "gradlew" -exec chmod +x {} +
          # Build and tell it where the keystore is just in case
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/debug/*.apk"
