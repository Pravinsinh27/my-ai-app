name: Build APK - Fix Gradle Block

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip mc-assets.zip
          # If the zip created a subfolder, move everything to the root
          if [ -d "mc-assets" ]; then mv mc-assets/* .; fi
          # Sometimes there is another level of folders
          if [ ! -f "build.gradle.kts" ]; then mv */* . || true; fi

      - name: Patch build files (Aggressive)
        run: |
          # 1. Remove the entire googleServices configuration block that causes the error
          # This looks for the block starting with googleServices and deletes until the closing }
          sed -i '/googleServices {/,/}/d' app/build.gradle.kts || true
          
          # 2. Remove any other mentions of Google Services or Plugins
          sed -i '/id("com.google.gms.google-services")/d' app/build.gradle.kts || true
          sed -i '/MissingGoogleServicesStrategy/d' app/build.gradle.kts || true
          
          # 3. Create the dummy file again just in case
          mkdir -p app
          echo '{"project_info":{"project_number":"1"},"client":[{"client_info":{"mobilesdk_app_id":"1","android_client_info":{"package_name":"com.aistudio.mcassets.bxgvqy"}}}]}' > app/google-services.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        run: |
          # Ensure gradlew is executable if it exists
          find . -name "gradlew" -exec chmod +x {} +
          
          # Use the system gradle since the local wrapper is acting up
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/debug/*.apk"
